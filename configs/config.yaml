experiment_name: default
experiment_dir: null
seed: 42
ssl: false

logger:
  _target_: pytorch_lightning.loggers.TensorBoardLogger
  save_dir: lightning_logs
  name: ${experiment_name}

model:
  _target_: src.module.simple_classifier.SimpleClassifier
  optimizer:
    _target_: torch.optim.Adam
    _partial_: true
    lr: 1e-3
    weight_decay: 1e-5
  num_classes: 10

datamodule:
  _target_: src.datamodule.default.mnist.MNISTDataModule
  data_dir: ./data
  batch_size: 64
  num_workers: 0

trainer:
  max_epochs: 2
  accelerator: auto
  devices: 1
  log_every_n_steps: 10
  callbacks:
    - _target_: pytorch_lightning.callbacks.ModelCheckpoint
      dirpath: checkpoints
      filename: best-{epoch:02d}-{val_loss:.4f}
      monitor: val_loss
      mode: min
      save_top_k: 1
      save_last: true
    - _target_: pytorch_lightning.callbacks.EarlyStopping
      monitor: val_loss
      patience: 3
      mode: min